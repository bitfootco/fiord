<div class="max-w-md bg-white dark:bg-[#222222] rounded-xl border border-chalk-300 dark:border-[#2E2E2E] p-6 shadow-[0_1px_2px_rgba(28,24,20,0.06)]">

  <h2 class="font-serif text-lg font-semibold text-chalk-900 dark:text-[#EDEAE3] mb-5">Edit Profile</h2>

  <div class="space-y-5">

    <!-- Name -->
    <div>
      <label for="fg-name" class="block text-sm font-medium text-chalk-700 dark:text-[#EDEAE3] mb-1.5">Name</label>
      <input
        type="text"
        id="fg-name"
        name="name"
        value="Margot Ashfield"
        class="block w-full rounded-lg border border-chalk-300 bg-white px-3 py-2 text-sm text-chalk-900 placeholder-chalk-400 shadow-[0_1px_2px_rgba(28,24,20,0.06)] focus:border-forest-500 focus:outline-none focus:ring-2 focus:ring-forest-500/20 transition-colors dark:border-[#2E2E2E] dark:bg-[#1A1A1A] dark:text-[#EDEAE3] dark:placeholder-[#6B6860]"
      />
    </div>

    <!-- Email -->
    <div>
      <label for="fg-email" class="block text-sm font-medium text-chalk-700 dark:text-[#EDEAE3] mb-1.5">Email</label>
      <input
        type="email"
        id="fg-email"
        name="email"
        value="margot@ashfield.co"
        class="block w-full rounded-lg border border-chalk-300 bg-white px-3 py-2 text-sm text-chalk-900 placeholder-chalk-400 shadow-[0_1px_2px_rgba(28,24,20,0.06)] focus:border-forest-500 focus:outline-none focus:ring-2 focus:ring-forest-500/20 transition-colors dark:border-[#2E2E2E] dark:bg-[#1A1A1A] dark:text-[#EDEAE3] dark:placeholder-[#6B6860]"
      />
      <p class="mt-1.5 text-xs text-chalk-600 dark:text-[#9B9690]">Used for sign-in and your digest delivery.</p>
    </div>

    <!-- Bio -->
    <div>
      <label for="fg-bio" class="block text-sm font-medium text-chalk-700 dark:text-[#EDEAE3] mb-1.5">Bio</label>
      <textarea
        id="fg-bio"
        name="bio"
        rows="3"
        class="block w-full rounded-lg border border-chalk-300 bg-white px-3 py-2 text-sm text-chalk-900 placeholder-chalk-400 shadow-[0_1px_2px_rgba(28,24,20,0.06)] focus:border-forest-500 focus:outline-none focus:ring-2 focus:ring-forest-500/20 transition-colors resize-none dark:border-[#2E2E2E] dark:bg-[#1A1A1A] dark:text-[#EDEAE3]"
      >Reader, writer, occasional thinker. Building tools for thought.</textarea>
    </div>

    <!-- Notifications -->
    <div>
      <p class="block text-sm font-medium text-chalk-700 dark:text-[#EDEAE3] mb-2.5">Notifications</p>
      <div class="space-y-2.5">
        <label class="flex items-center gap-3 cursor-pointer">
          <input
            type="checkbox"
            name="notify_digest"
            checked
            class="h-4 w-4 rounded border-chalk-300 text-forest-500 focus:ring-forest-500/30 focus:ring-offset-0 dark:border-[#2E2E2E] dark:bg-[#1A1A1A]"
          />
          <span class="text-sm text-chalk-900 dark:text-[#EDEAE3]">Send me the weekly reading digest</span>
        </label>
        <label class="flex items-center gap-3 cursor-pointer">
          <input
            type="checkbox"
            name="notify_streak"
            class="h-4 w-4 rounded border-chalk-300 text-forest-500 focus:ring-forest-500/30 focus:ring-offset-0 dark:border-[#2E2E2E] dark:bg-[#1A1A1A]"
          />
          <span class="text-sm text-chalk-900 dark:text-[#EDEAE3]">Remind me when my streak is at risk</span>
        </label>
      </div>
    </div>

  </div>

  <!-- Actions -->
  <div class="flex items-center justify-end gap-3 mt-6 pt-5 border-t border-chalk-200 dark:border-[#2E2E2E]">
    <button
      type="button"
      class="px-4 py-2 rounded-lg text-sm font-medium text-chalk-700 dark:text-[#9B9690] hover:bg-chalk-100 dark:hover:bg-[#2E2B24] transition-colors"
    >Cancel</button>
    <button
      type="submit"
      class="px-4 py-2 rounded-lg text-sm font-medium text-white bg-forest-500 hover:bg-forest-600 dark:bg-[#1A5C45] dark:hover:bg-[#144A38] transition-colors shadow-[0_1px_2px_rgba(28,24,20,0.12)]"
    >Save changes</button>
  </div>

</div>
