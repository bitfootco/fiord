      <button class="px-4 py-2 text-sm italic font-['DM_Sans'] text-[#1C1816] bg-white hover:bg-[#F3F0EA] border-r border-[#E5DFD6] focus:outline-none focus:ring-2 focus:ring-inset focus:ring-[#D4440F] transition-colors duration-150 dark:bg-[#1C1816] dark:text-[#F3F0EA] dark:border-[#3A3532] dark:hover:bg-[#2A2522]">

        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h10M4 18h12"/></svg>
