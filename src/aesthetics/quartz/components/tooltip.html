    <div class="flex flex-wrap items-center gap-8 p-8 bg-white dark:bg-quartz-800 rounded-lg border border-quartz-200 dark:border-quartz-700">

      <!-- Tooltip example 1: Icon button -->
      <div class="flex flex-col items-center gap-2">
        <p class="text-xs text-quartz-500 dark:text-quartz-400 uppercase tracking-wide font-medium">Icon button</p>
        <button

            Publish

        </span>
