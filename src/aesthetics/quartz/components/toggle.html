    <div class="space-y-4">

      <!-- Off state -->
      <div class="flex items-center justify-between py-3 border-b border-quartz-200 dark:border-quartz-700">
        <div>
          <p class="text-sm font-medium text-quartz-700 dark:text-quartz-300">Email notifications</p>
          <p class="text-xs text-quartz-500 dark:text-quartz-400 mt-0.5">Receive updates and activity summaries by email.</p>
        </div>
        <button
          type="button"
          role="switch"
          aria-checked="false"
          aria-label="Email notifications"
          class="relative inline-flex h-6 w-11 shrink-0 cursor-pointer items-center rounded-full border-2 border-transparent bg-quartz-200 transition-colors focus:outline-none focus:ring-2 focus:ring-[#0891B2] focus:ring-offset-2 dark:bg-quartz-700 dark:focus:ring-offset-quartz-900"
        >
          <span
            aria-hidden="true"
            class="inline-block h-5 w-5 translate-x-0 transform rounded-full bg-white shadow ring-0 transition-transform"
          ></span>
        </button>
      </div>

      <!-- On state -->
      <div class="flex items-center justify-between py-3 border-b border-quartz-200 dark:border-quartz-700">
        <div>
          <p class="text-sm font-medium text-quartz-700 dark:text-quartz-300">Marketing emails</p>
          <p class="text-xs text-quartz-500 dark:text-quartz-400 mt-0.5">Receive product announcements, tips, and offers.</p>
        </div>
        <button
          type="button"
          role="switch"
          aria-checked="true"
          aria-label="Marketing emails"
          class="relative inline-flex h-6 w-11 shrink-0 cursor-pointer items-center rounded-full border-2 border-transparent bg-[#0E7490] transition-colors focus:outline-none focus:ring-2 focus:ring-[#0891B2] focus:ring-offset-2 dark:bg-[#0891B2] dark:focus:ring-offset-quartz-900"
        >
          <span
            aria-hidden="true"
            class="inline-block h-5 w-5 translate-x-5 transform rounded-full bg-white shadow ring-0 transition-transform"
          ></span>
        </button>
      </div>

      <!-- Disabled state -->
      <div class="flex items-center justify-between py-3 opacity-50">
        <div>
          <p class="text-sm font-medium text-quartz-700 dark:text-quartz-300">Security alerts</p>
          <p class="text-xs text-quartz-500 dark:text-quartz-400 mt-0.5">Critical alerts about your account. Always enabled.</p>
        </div>
        <button
          type="button"
          role="switch"
          aria-checked="true"
          aria-label="Security alerts"
          disabled
          class="relative inline-flex h-6 w-11 shrink-0 cursor-not-allowed items-center rounded-full border-2 border-transparent bg-[#0E7490] transition-colors dark:bg-[#0891B2]"
        >
          <span
            aria-hidden="true"
            class="inline-block h-5 w-5 translate-x-5 transform rounded-full bg-white shadow ring-0 transition-transform"
          ></span>
        </button>
      </div>

    </div>
