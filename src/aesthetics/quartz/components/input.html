    <div class="space-y-5">

      <!-- Default input -->
      <div>
        <label for="input-email" class="block text-sm font-medium text-quartz-700 dark:text-quartz-300 mb-1.5">
          Email address
        </label>
        <input
          type="email"
          id="input-email"
          name="email"
          placeholder="you@example.com"
          class="block w-full rounded border border-quartz-300 bg-white px-3 py-2 text-sm text-quartz-900 placeholder-quartz-400 shadow-sm focus:border-[#0891B2] focus:outline-none focus:ring-2 focus:ring-[#0891B2] focus:ring-offset-0 transition-colors dark:border-quartz-600 dark:bg-quartz-800 dark:text-quartz-100 dark:placeholder-quartz-500 dark:focus:border-[#06B6D4] dark:focus:ring-[#06B6D4]"
        />
      </div>

      <!-- Focused state (visual demo via ring classes) -->
      <div>
        <label for="input-name" class="block text-sm font-medium text-quartz-700 dark:text-quartz-300 mb-1.5">
          Full name
        </label>
        <input
          type="text"
          id="input-name"
          name="name"
          value="Jordan Reeves"
          class="block w-full rounded border border-[#0891B2] bg-white px-3 py-2 text-sm text-quartz-900 shadow-sm outline-none ring-2 ring-[#0891B2] ring-offset-0 transition-colors dark:border-[#06B6D4] dark:bg-quartz-800 dark:text-quartz-100 dark:ring-[#06B6D4]"
        />
        <p class="mt-1.5 text-xs text-quartz-500 dark:text-quartz-400">This field is shown in a focused state.</p>
      </div>

      <!-- Error state -->
      <div>
        <label for="input-username" class="block text-sm font-medium text-quartz-700 dark:text-quartz-300 mb-1.5">
          Username
        </label>
        <input
          type="text"
          id="input-username"
          name="username"
          value="j reeves!"
          aria-describedby="input-username-error"
          aria-invalid="true"
          class="block w-full rounded border border-red-400 bg-white px-3 py-2 text-sm text-quartz-900 placeholder-quartz-400 shadow-sm focus:border-red-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-0 transition-colors dark:border-red-500 dark:bg-quartz-800 dark:text-quartz-100"
        />
        <p id="input-username-error" class="mt-1.5 text-xs text-red-600 dark:text-red-400" role="alert">
          Username can only contain letters, numbers, hyphens, and underscores.
        </p>
      </div>

      <!-- Disabled state -->
      <div>
        <label for="input-account-id" class="block text-sm font-medium text-quartz-400 dark:text-quartz-500 mb-1.5">
          Account ID
        </label>
        <input
          type="text"
          id="input-account-id"
          name="account_id"
          value="acc_8f3k92mxp1"
          disabled
          class="block w-full rounded border border-quartz-200 bg-quartz-50 px-3 py-2 text-sm text-quartz-400 shadow-sm cursor-not-allowed select-none dark:border-quartz-700 dark:bg-quartz-900 dark:text-quartz-600"
        />
        <p class="mt-1.5 text-xs text-quartz-400 dark:text-quartz-500">Your account ID cannot be changed.</p>
      </div>

    </div>
