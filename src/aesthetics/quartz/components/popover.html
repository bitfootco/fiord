    <div class="flex flex-wrap items-start gap-10 p-8 bg-white dark:bg-quartz-800 rounded-lg border border-quartz-200 dark:border-quartz-700">

      <!-- Popover example 1: Info popover -->
      <div class="relative inline-block">
        <button
          data-fiord-popover-trigger="popover-info"
          class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-quartz-700 dark:text-quartz-300 border border-quartz-300 dark:border-quartz-600 rounded hover:bg-quartz-50 dark:hover:bg-quartz-700 transition-colors"
          aria-expanded="false"
          aria-haspopup="true"
        >
          <svg class="w-4 h-4 text-quartz-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z"/>
          </svg>
          More info
        </button>

        <div
          id="popover-info"
          data-fiord-popover-panel
          class="hidden absolute left-0 top-full mt-2 z-20 w-72 bg-white dark:bg-quartz-900 border border-quartz-200 dark:border-quartz-700 rounded-lg shadow-lg shadow-quartz-900/10 dark:shadow-quartz-950/30"
          role="region"
          aria-label="More information"
        >
          <div class="p-4">
            <h3 class="font-['Bricolage_Grotesque'] text-sm font-semibold text-quartz-900 dark:text-quartz-100 mb-1">Retention Rate</h3>
            <p class="text-sm text-quartz-600 dark:text-quartz-400 leading-relaxed mb-3">
              Measures the percentage of users who return within 30 days of their first session.
              Industry average for B2B SaaS is 35–45%.
            </p>
            <a
              href="#"
              class="inline-flex items-center gap-1 text-xs font-medium text-[#0891B2] dark:text-[#06B6D4] hover:text-[#0E7490] dark:hover:text-[#22D3EE] transition-colors"
            >
              View documentation
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
              </svg>
            </a>
          </div>
        </div>
      </div>

      <!-- Popover example 2: User card popover -->
      <div class="relative inline-block">
        <button
          data-fiord-popover-trigger="popover-user"
          class="inline-flex items-center gap-2 px-3 py-1.5 text-sm font-medium text-quartz-700 dark:text-quartz-300 border border-quartz-300 dark:border-quartz-600 rounded hover:bg-quartz-50 dark:hover:bg-quartz-700 transition-colors"
          aria-expanded="false"
          aria-haspopup="true"
        >
          <span class="w-5 h-5 rounded-full bg-[#ECFEFF] dark:bg-[#164E63] flex items-center justify-center text-xs font-bold text-[#0891B2] dark:text-[#22D3EE]">J</span>
          Assigned to
        </button>

        <div
          id="popover-user"
          data-fiord-popover-panel
          class="hidden absolute left-0 top-full mt-2 z-20 w-64 bg-white dark:bg-quartz-900 border border-quartz-200 dark:border-quartz-700 rounded-lg shadow-lg shadow-quartz-900/10 dark:shadow-quartz-950/30"
          role="region"
          aria-label="Assignee details"
        >
          <div class="p-4">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-full bg-[#ECFEFF] dark:bg-[#164E63] flex items-center justify-center text-sm font-bold text-[#0891B2] dark:text-[#22D3EE] shrink-0">
                JE
              </div>
              <div>
                <p class="text-sm font-semibold text-quartz-900 dark:text-quartz-100">Jordan Ellsworth</p>
                <p class="text-xs text-quartz-500 dark:text-quartz-400">jordan@clearwater.com</p>
              </div>
            </div>
            <button
              class="w-full px-3 py-1.5 text-xs font-medium text-quartz-700 dark:text-quartz-300 border border-quartz-300 dark:border-quartz-600 rounded hover:bg-quartz-50 dark:hover:bg-quartz-700 transition-colors"
            >
              Reassign
            </button>
          </div>
        </div>
      </div>

    </div>
