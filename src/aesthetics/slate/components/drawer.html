    <div
      id="drawer-demo"
      data-fiord-drawer
      class="hidden fixed inset-0 z-50"
      aria-modal="true"
      role="dialog"
      aria-labelledby="drawer-title"
    >
      <!-- Backdrop -->
      <div
        data-fiord-drawer-close
        class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity"
        aria-hidden="true"
      ></div>

      <!-- Drawer panel -->
      <div
        data-fiord-drawer-panel
        class="absolute right-0 top-0 h-full w-full max-w-sm bg-white dark:bg-slate-800 shadow-xl shadow-slate-900/10 dark:shadow-slate-950/30 border-l border-slate-200 dark:border-slate-700 flex flex-col translate-x-full transition-transform duration-300 ease-in-out"
      >
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700 shrink-0">
          <h2 id="drawer-title" class="font-['Outfit'] text-base font-semibold text-slate-900 dark:text-slate-100">
            Edit Profile
          </h2>
          <button
            data-fiord-drawer-close
            class="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 rounded transition-colors"
            aria-label="Close drawer"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <!-- Body -->
        <div class="flex-1 overflow-y-auto px-6 py-6">
          <form class="space-y-5" onsubmit="return false;">
            <div>
              <label for="drawer-name" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
                Full name
              </label>
              <input
                id="drawer-name"
                type="text"
                value="Jordan Ellsworth"
                class="w-full px-3 py-2 text-sm border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#4F63D2] dark:focus:ring-[#6B7BE0]"
              />
            </div>

            <div>
              <label for="drawer-email" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
                Email address
              </label>
              <input
                id="drawer-email"
                type="email"
                value="jordan@meridian.io"
                class="w-full px-3 py-2 text-sm border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#4F63D2] dark:focus:ring-[#6B7BE0]"
              />
            </div>

            <div>
              <label for="drawer-role" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
                Role
              </label>
              <select
                id="drawer-role"
                class="w-full px-3 py-2 text-sm border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-[#4F63D2] dark:focus:ring-[#6B7BE0]"
              >
                <option>Viewer</option>
                <option selected>Editor</option>
                <option>Admin</option>
              </select>
            </div>

            <div>
              <label for="drawer-bio" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
                Bio
              </label>
              <textarea
                id="drawer-bio"
                rows="3"
                class="w-full px-3 py-2 text-sm border border-slate-300 dark:border-slate-600 rounded-md bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#4F63D2] dark:focus:ring-[#6B7BE0] resize-none"
                placeholder="Tell your team a bit about yourself..."
              >Data analyst focused on growth metrics and retention.</textarea>
            </div>
          </form>
        </div>

        <!-- Footer -->
        <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-200 dark:border-slate-700 shrink-0">
          <button
            data-fiord-drawer-close
            class="px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
          >
            Cancel
          </button>
          <button
            class="px-4 py-2 text-sm font-semibold text-white bg-[#3D4FB8] rounded-md hover:bg-[#3545A0] transition-colors shadow-sm"
          >
            Save Changes
          </button>
        </div>
      </div>
    </div>
