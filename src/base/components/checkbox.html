    <div class="space-y-6">

      <!-- Single checkbox -->
      <div>
        <p class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Single</p>
        <label class="flex items-start gap-3 cursor-pointer">
          <input
            type="checkbox"
            class="mt-0.5 h-4 w-4 shrink-0 rounded border-gray-300 text-gray-900 accent-gray-900 focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 dark:border-gray-600 dark:accent-gray-100"
          />
          <div>
            <span class="block text-sm font-medium text-gray-700 dark:text-gray-300">I agree to the terms of service</span>
            <span class="block text-xs text-gray-500 dark:text-gray-400 mt-0.5">
              By checking this box you confirm you have read and accept our
              <a href="#" class="underline hover:text-gray-700 dark:hover:text-gray-300">Terms of Service</a>
              and
              <a href="#" class="underline hover:text-gray-700 dark:hover:text-gray-300">Privacy Policy</a>.
            </span>
          </div>
        </label>
      </div>

      <!-- Checkbox group — notification preferences -->
      <div>
        <p class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Notification Preferences</p>
        <fieldset>
          <legend class="sr-only">Notification preferences</legend>
          <div class="space-y-3">

            <label class="flex items-start gap-3 cursor-pointer">
              <input
                type="checkbox"
                name="notifications"
                value="comments"
                checked
                class="mt-0.5 h-4 w-4 shrink-0 rounded border-gray-300 text-gray-900 accent-gray-900 focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 dark:border-gray-600 dark:accent-gray-100"
              />
              <div>
                <span class="block text-sm font-medium text-gray-700 dark:text-gray-300">Comments</span>
                <span class="block text-xs text-gray-500 dark:text-gray-400">Get notified when someone comments on your posts.</span>
              </div>
            </label>

            <label class="flex items-start gap-3 cursor-pointer">
              <input
                type="checkbox"
                name="notifications"
                value="mentions"
                checked
                class="mt-0.5 h-4 w-4 shrink-0 rounded border-gray-300 text-gray-900 accent-gray-900 focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 dark:border-gray-600 dark:accent-gray-100"
              />
              <div>
                <span class="block text-sm font-medium text-gray-700 dark:text-gray-300">Mentions</span>
                <span class="block text-xs text-gray-500 dark:text-gray-400">Get notified when someone mentions you in a discussion.</span>
              </div>
            </label>

            <label class="flex items-start gap-3 cursor-pointer">
              <input
                type="checkbox"
                name="notifications"
                value="security"
                class="mt-0.5 h-4 w-4 shrink-0 rounded border-gray-300 text-gray-900 accent-gray-900 focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 dark:border-gray-600 dark:accent-gray-100"
              />
              <div>
                <span class="block text-sm font-medium text-gray-700 dark:text-gray-300">Security alerts</span>
                <span class="block text-xs text-gray-500 dark:text-gray-400">Get important alerts about your account security.</span>
              </div>
            </label>

          </div>
        </fieldset>
      </div>

      <!-- Checked + disabled state -->
      <div>
        <p class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Checked &amp; Disabled</p>
        <label class="flex items-start gap-3 cursor-not-allowed opacity-60">
          <input
            type="checkbox"
            checked
            disabled
            class="mt-0.5 h-4 w-4 shrink-0 rounded border-gray-300 text-gray-900 accent-gray-900 cursor-not-allowed dark:border-gray-600 dark:accent-gray-100"
          />
          <div>
            <span class="block text-sm font-medium text-gray-700 dark:text-gray-300">Receive transactional emails</span>
            <span class="block text-xs text-gray-500 dark:text-gray-400">Required for account notifications. Cannot be disabled.</span>
          </div>
        </label>
      </div>

    </div>
