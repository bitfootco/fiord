<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiord — Base / Toggle</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 dark:bg-gray-900">
  <div class="max-w-2xl mx-auto">

    <!-- FIORD:COMPONENT_START aesthetic="base" component="toggle" -->
    <div class="space-y-4">

      <!-- Off state -->
      <div class="flex items-center justify-between py-3 border-b border-gray-200 dark:border-gray-700">
        <div>
          <p class="text-sm font-medium text-gray-700 dark:text-gray-300">Email notifications</p>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Receive updates and activity summaries by email.</p>
        </div>
        <button
          type="button"
          role="switch"
          aria-checked="false"
          aria-label="Email notifications"
          class="relative inline-flex h-6 w-11 shrink-0 cursor-pointer items-center rounded-full border-2 border-transparent bg-gray-200 transition-colors focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 dark:bg-gray-700"
        >
          <span
            aria-hidden="true"
            class="inline-block h-5 w-5 translate-x-0 transform rounded-full bg-white shadow ring-0 transition-transform"
          ></span>
        </button>
      </div>

      <!-- On state -->
      <div class="flex items-center justify-between py-3 border-b border-gray-200 dark:border-gray-700">
        <div>
          <p class="text-sm font-medium text-gray-700 dark:text-gray-300">Marketing emails</p>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Receive product announcements, tips, and offers.</p>
        </div>
        <button
          type="button"
          role="switch"
          aria-checked="true"
          aria-label="Marketing emails"
          class="relative inline-flex h-6 w-11 shrink-0 cursor-pointer items-center rounded-full border-2 border-transparent bg-gray-900 transition-colors focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 dark:bg-gray-100"
        >
          <span
            aria-hidden="true"
            class="inline-block h-5 w-5 translate-x-5 transform rounded-full bg-white shadow ring-0 transition-transform"
          ></span>
        </button>
      </div>

      <!-- Disabled state -->
      <div class="flex items-center justify-between py-3 opacity-50">
        <div>
          <p class="text-sm font-medium text-gray-700 dark:text-gray-300">Security alerts</p>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Critical alerts about your account. Always enabled.</p>
        </div>
        <button
          type="button"
          role="switch"
          aria-checked="true"
          aria-label="Security alerts"
          disabled
          class="relative inline-flex h-6 w-11 shrink-0 cursor-not-allowed items-center rounded-full border-2 border-transparent bg-gray-900 transition-colors dark:bg-gray-100"
        >
          <span
            aria-hidden="true"
            class="inline-block h-5 w-5 translate-x-5 transform rounded-full bg-white shadow ring-0 transition-transform"
          ></span>
        </button>
      </div>

    </div>
    <!-- FIORD:COMPONENT_END -->

  </div>
</body>
</html>
