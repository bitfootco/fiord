<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiord — Base / Pagination</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 dark:bg-gray-900">
  <div class="max-w-3xl mx-auto">

    <!-- FIORD:COMPONENT_START aesthetic="base" component="pagination" -->
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">

      <!-- Results summary + items per page -->
      <div class="flex items-center gap-3">
        <p class="text-sm text-gray-600 dark:text-gray-400">
          Showing <span class="font-medium text-gray-900 dark:text-gray-100">76–100</span> of <span class="font-medium text-gray-900 dark:text-gray-100">689</span> results
        </p>
        <div class="flex items-center gap-1.5">
          <label for="per-page" class="text-xs text-gray-500 dark:text-gray-400">Per page</label>
          <select
            id="per-page"
            class="rounded-md border border-gray-300 bg-white py-1 pl-2 pr-7 text-xs text-gray-700 focus:border-gray-400 focus:outline-none focus:ring-1 focus:ring-gray-400 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300"
          >
            <option>10</option>
            <option>25</option>
            <option selected>25</option>
            <option>50</option>
            <option>100</option>
          </select>
        </div>
      </div>

      <!-- Page navigation -->
      <nav aria-label="Pagination">
        <ol class="flex items-center gap-1">

          <!-- Previous -->
          <li>
            <a
              href="#"
              class="flex items-center gap-1 rounded-md border border-gray-300 bg-white px-3 py-1.5 text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-1 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700"
              aria-label="Previous page"
            >
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
              </svg>
              Prev
            </a>
          </li>

          <!-- Page 2 -->
          <li>
            <a href="#" class="flex h-9 w-9 items-center justify-center rounded-md border border-gray-300 bg-white text-sm text-gray-700 hover:bg-gray-50 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700" aria-label="Page 2">2</a>
          </li>

          <!-- Page 3 -->
          <li>
            <a href="#" class="flex h-9 w-9 items-center justify-center rounded-md border border-gray-300 bg-white text-sm text-gray-700 hover:bg-gray-50 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700" aria-label="Page 3">3</a>
          </li>

          <!-- Current — Page 4 -->
          <li>
            <a
              href="#"
              class="flex h-9 w-9 items-center justify-center rounded-md border border-gray-900 bg-gray-900 text-sm font-medium text-white focus:outline-none dark:border-gray-100 dark:bg-gray-100 dark:text-gray-900"
              aria-label="Page 4"
              aria-current="page"
            >4</a>
          </li>

          <!-- Page 5 -->
          <li>
            <a href="#" class="flex h-9 w-9 items-center justify-center rounded-md border border-gray-300 bg-white text-sm text-gray-700 hover:bg-gray-50 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700" aria-label="Page 5">5</a>
          </li>

          <!-- Ellipsis -->
          <li>
            <span class="flex h-9 w-9 items-center justify-center text-sm text-gray-500 dark:text-gray-400" aria-hidden="true">&hellip;</span>
          </li>

          <!-- Last page — 28 -->
          <li>
            <a href="#" class="flex h-9 w-9 items-center justify-center rounded-md border border-gray-300 bg-white text-sm text-gray-700 hover:bg-gray-50 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700" aria-label="Page 28">28</a>
          </li>

          <!-- Next -->
          <li>
            <a
              href="#"
              class="flex items-center gap-1 rounded-md border border-gray-300 bg-white px-3 py-1.5 text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-1 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700"
              aria-label="Next page"
            >
              Next
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
              </svg>
            </a>
          </li>

        </ol>
      </nav>

    </div>

    <!-- FIORD:COMPONENT_END -->

  </div>
</body>
</html>
