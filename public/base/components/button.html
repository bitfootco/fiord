<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiord — Base / Button</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 dark:bg-gray-900">
  <div class="max-w-2xl mx-auto space-y-8">

    <!-- FIORD:COMPONENT_START aesthetic="base" component="button" -->
    <div class="space-y-6">

      <!-- Variants -->
      <div>
        <p class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Variants</p>
        <div class="flex flex-wrap gap-3 items-center">
          <!-- Primary -->
          <button
            type="button"
            class="inline-flex items-center justify-center rounded-md bg-gray-900 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2 transition-colors dark:bg-gray-100 dark:text-gray-900 dark:hover:bg-gray-300 dark:focus:ring-gray-100"
          >
            Save changes
          </button>

          <!-- Secondary -->
          <button
            type="button"
            class="inline-flex items-center justify-center rounded-md bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 transition-colors dark:bg-gray-800 dark:text-gray-200 dark:ring-gray-600 dark:hover:bg-gray-700 dark:focus:ring-gray-400"
          >
            Cancel
          </button>

          <!-- Ghost -->
          <button
            type="button"
            class="inline-flex items-center justify-center rounded-md px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 transition-colors dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-gray-100 dark:focus:ring-gray-400"
          >
            Learn more
          </button>

          <!-- Destructive -->
          <button
            type="button"
            class="inline-flex items-center justify-center rounded-md bg-red-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 transition-colors dark:bg-red-700 dark:hover:bg-red-600 dark:focus:ring-red-500"
          >
            Delete account
          </button>
        </div>
      </div>

      <!-- Sizes -->
      <div>
        <p class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Sizes</p>
        <div class="flex flex-wrap gap-3 items-center">
          <!-- Small -->
          <button
            type="button"
            class="inline-flex items-center justify-center rounded-md bg-gray-900 px-3 py-1.5 text-xs font-medium text-white shadow-sm hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2 transition-colors dark:bg-gray-100 dark:text-gray-900 dark:hover:bg-gray-300"
          >
            Publish
          </button>

          <!-- Medium (default) -->
          <button
            type="button"
            class="inline-flex items-center justify-center rounded-md bg-gray-900 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2 transition-colors dark:bg-gray-100 dark:text-gray-900 dark:hover:bg-gray-300"
          >
            Publish
          </button>

          <!-- Large -->
          <button
            type="button"
            class="inline-flex items-center justify-center rounded-md bg-gray-900 px-6 py-3 text-base font-medium text-white shadow-sm hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2 transition-colors dark:bg-gray-100 dark:text-gray-900 dark:hover:bg-gray-300"
          >
            Publish
          </button>
        </div>
      </div>

      <!-- Disabled states -->
      <div>
        <p class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Disabled</p>
        <div class="flex flex-wrap gap-3 items-center">
          <button
            type="button"
            disabled
            class="inline-flex items-center justify-center rounded-md bg-gray-900 px-4 py-2 text-sm font-medium text-white shadow-sm opacity-50 cursor-not-allowed dark:bg-gray-100 dark:text-gray-900"
          >
            Save changes
          </button>

          <button
            type="button"
            disabled
            class="inline-flex items-center justify-center rounded-md bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm ring-1 ring-inset ring-gray-300 opacity-50 cursor-not-allowed dark:bg-gray-800 dark:text-gray-200 dark:ring-gray-600"
          >
            Cancel
          </button>

          <button
            type="button"
            disabled
            class="inline-flex items-center justify-center rounded-md bg-red-600 px-4 py-2 text-sm font-medium text-white shadow-sm opacity-50 cursor-not-allowed dark:bg-red-700"
          >
            Delete account
          </button>
        </div>
      </div>

    </div>

    <!-- FIORD:COMPONENT_END -->

  </div>
</body>
</html>
