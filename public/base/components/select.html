<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiord — Base / Select</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 dark:bg-gray-900">
  <div class="max-w-2xl mx-auto space-y-8">

    <!-- FIORD:COMPONENT_START aesthetic="base" component="select" -->
    <div class="space-y-5">

      <!-- Country select -->
      <div>
        <label for="select-country" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
          Country
        </label>
        <div class="relative">
          <select
            id="select-country"
            name="country"
            class="block w-full appearance-none rounded-md border border-gray-300 bg-white py-2 pl-3 pr-10 text-sm text-gray-900 shadow-sm focus:border-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-0 transition-colors dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 dark:focus:border-gray-400 dark:focus:ring-gray-400"
          >
            <option value="">Select a country…</option>
            <option value="us">United States</option>
            <option value="ca">Canada</option>
            <option value="gb">United Kingdom</option>
            <option value="au">Australia</option>
            <option value="de">Germany</option>
            <option value="fr">France</option>
            <option value="jp">Japan</option>
            <option value="sg">Singapore</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
            <svg class="w-4 h-4 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
            </svg>
          </div>
        </div>
        <p class="mt-1.5 text-xs text-gray-500 dark:text-gray-400">Used for billing and tax purposes.</p>
      </div>

      <!-- Plan type select -->
      <div>
        <label for="select-plan" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
          Subscription plan
        </label>
        <div class="relative">
          <select
            id="select-plan"
            name="plan"
            class="block w-full appearance-none rounded-md border border-gray-300 bg-white py-2 pl-3 pr-10 text-sm text-gray-900 shadow-sm focus:border-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-0 transition-colors dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 dark:focus:border-gray-400 dark:focus:ring-gray-400"
          >
            <option value="starter">Starter — Free</option>
            <option value="pro" selected>Pro — $12 / month</option>
            <option value="team">Team — $49 / month</option>
            <option value="enterprise">Enterprise — Contact us</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
            <svg class="w-4 h-4 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
            </svg>
          </div>
        </div>
        <p class="mt-1.5 text-xs text-gray-500 dark:text-gray-400">
          You can upgrade or downgrade at any time.
          <a href="#" class="text-gray-700 underline hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-200">Compare plans</a>
        </p>
      </div>

    </div>

    <!-- FIORD:COMPONENT_END -->

  </div>
</body>
</html>
