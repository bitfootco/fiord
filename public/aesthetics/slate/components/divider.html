<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiord — Slate / Divider</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        slate: {
          50: '#F7F8FA', 100: '#EEF0F4', 200: '#D2D7E2', 300: '#A3ADBE',
          400: '#7B8598', 500: '#5B6578', 600: '#3A4459', 700: '#2A3550',
          800: '#1A2235', 900: '#131927', 950: '#0A0F1A'
        }
      }}}
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 dark:bg-slate-950 p-8 font-['Plus_Jakarta_Sans']">
  <div class="max-w-2xl mx-auto">

    <!-- FIORD:COMPONENT_START aesthetic="slate" component="divider" -->
    <div class="space-y-10">

      <!-- Plain divider -->
      <div>
        <p class="text-sm text-slate-600 dark:text-slate-400 mb-4">
          Webhooks are sent as POST requests to your configured endpoint within 500ms of the triggering event.
        </p>
        <hr class="border-t border-slate-200 dark:border-slate-700" />
        <p class="text-sm text-slate-600 dark:text-slate-400 mt-4">
          Each request includes an <code class="font-['JetBrains_Mono'] text-xs bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded text-slate-700 dark:text-slate-300">X-Fiord-Signature</code> header for payload verification.
        </p>
      </div>

      <!-- Divider with centered label -->
      <div>
        <div class="relative">
          <div class="absolute inset-0 flex items-center" aria-hidden="true">
            <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
          </div>
          <div class="relative flex justify-center">
            <span class="px-3 bg-slate-100 dark:bg-slate-950 text-sm text-slate-500 dark:text-slate-400">
              or continue with
            </span>
          </div>
        </div>
      </div>

      <!-- Divider with section label (left-aligned) -->
      <div>
        <div class="relative">
          <div class="absolute inset-0 flex items-center" aria-hidden="true">
            <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
          </div>
          <div class="relative flex justify-start">
            <span class="pr-3 bg-slate-100 dark:bg-slate-950 text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-widest">
              Advanced settings
            </span>
          </div>
        </div>
      </div>

      <!-- Divider with icon -->
      <div>
        <div class="relative">
          <div class="absolute inset-0 flex items-center" aria-hidden="true">
            <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
          </div>
          <div class="relative flex justify-center">
            <span class="bg-slate-100 dark:bg-slate-950 px-2 text-slate-400 dark:text-slate-500">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
              </svg>
            </span>
          </div>
        </div>
      </div>

    </div>
    <!-- FIORD:COMPONENT_END -->

  </div>
</body>
</html>
