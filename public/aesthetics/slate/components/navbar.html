<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiord — Slate / Navbar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        slate: {
          50: '#F7F8FA', 100: '#EEF0F4', 200: '#D2D7E2', 300: '#A3ADBE',
          400: '#7B8598', 500: '#5B6578', 600: '#3A4459', 700: '#2A3550',
          800: '#1A2235', 900: '#131927', 950: '#0A0F1A'
        }
      }}}
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 p-8 font-['Plus_Jakarta_Sans'] dark:bg-slate-900">
  <div class="max-w-5xl mx-auto">

    <!-- FIORD:COMPONENT_START aesthetic="slate" component="navbar" -->
    <nav class="rounded-lg border border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-800" style="box-shadow: 0 1px 2px rgba(12,18,34,0.06), 0 1px 1px rgba(12,18,34,0.04);" aria-label="Main navigation">
      <div class="mx-auto max-w-7xl px-4 sm:px-6">
        <div class="flex h-16 items-center justify-between">

          <!-- Logo -->
          <div class="flex items-center gap-2">
            <div class="flex h-8 w-8 items-center justify-center rounded-md bg-slate-900 dark:bg-slate-100">
              <svg class="h-5 w-5 text-white dark:text-slate-900" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418" />
              </svg>
            </div>
            <span class="text-base font-semibold text-slate-900 dark:text-slate-100">Meridian</span>
          </div>

          <!-- Desktop nav links -->
          <div class="hidden items-center gap-1 md:flex">
            <a href="#" class="rounded-md px-3 py-2 text-sm font-medium text-slate-500 hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-700 dark:hover:text-slate-100">Product</a>
            <a href="#" class="rounded-md px-3 py-2 text-sm font-medium text-slate-500 hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-700 dark:hover:text-slate-100">Solutions</a>
            <a href="#" class="rounded-md px-3 py-2 text-sm font-medium text-slate-500 hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-700 dark:hover:text-slate-100">Pricing</a>
            <a href="#" class="rounded-md px-3 py-2 text-sm font-medium text-slate-500 hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-700 dark:hover:text-slate-100">Docs</a>
            <a href="#" class="rounded-md px-3 py-2 text-sm font-medium text-slate-500 hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-700 dark:hover:text-slate-100">Blog</a>
          </div>

          <!-- Desktop CTA buttons -->
          <div class="hidden items-center gap-2 md:flex">
            <a href="#" class="rounded-md px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-700 dark:hover:text-slate-100">Log in</a>
            <a href="#" class="rounded-md bg-[#3D4FB8] px-4 py-2 text-sm font-medium text-white hover:bg-[#3545A0] focus:outline-none focus:ring-2 focus:ring-[#4F63D2] focus:ring-offset-2 dark:bg-[#4F63D2] dark:hover:bg-[#3D4FB8] dark:focus:ring-offset-slate-800">Sign up</a>
          </div>

          <!-- Mobile hamburger (non-functional, structural) -->
          <button
            type="button"
            class="inline-flex items-center justify-center rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-slate-500 md:hidden dark:text-slate-400 dark:hover:bg-slate-700"
            aria-expanded="false"
            aria-label="Open main menu"
          >
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
          </button>

        </div>
      </div>
    </nav>
    <!-- FIORD:COMPONENT_END -->

  </div>
</body>
</html>
