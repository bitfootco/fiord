<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiord — Slate / Container</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        slate: {
          50: '#F7F8FA', 100: '#EEF0F4', 200: '#D2D7E2', 300: '#A3ADBE',
          400: '#7B8598', 500: '#5B6578', 600: '#3A4459', 700: '#2A3550',
          800: '#1A2235', 900: '#131927', 950: '#0A0F1A'
        }
      }}}
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 dark:bg-slate-950 p-8 font-['Plus_Jakarta_Sans']">
  <div class="max-w-2xl mx-auto">

    <!-- FIORD:COMPONENT_START aesthetic="slate" component="container" -->
    <div class="w-full max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="font-['Outfit'] text-2xl font-semibold text-slate-900 dark:text-slate-100 tracking-tight">
        Getting started with distributed systems
      </h2>
      <p class="mt-3 text-base text-slate-600 dark:text-slate-400 leading-relaxed max-w-prose">
        Distributed systems introduce new failure modes that don't exist in single-process applications.
        Understanding how network partitions, clock skew, and partial failures interact is essential before
        writing your first line of distributed code.
      </p>
      <div class="mt-6">
        <button
          type="button"
          class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-[#3D4FB8] hover:bg-[#4F63D2] dark:bg-[#4F63D2] dark:hover:bg-[#6B7BE0] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#4F63D2] dark:focus:ring-offset-slate-950 transition-colors"
        >
          Read the guide
        </button>
      </div>
    </div>
    <!-- FIORD:COMPONENT_END -->

  </div>
</body>
</html>
