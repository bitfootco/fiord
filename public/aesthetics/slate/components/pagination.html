<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiord — Slate / Pagination</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        slate: {
          50: '#F7F8FA', 100: '#EEF0F4', 200: '#D2D7E2', 300: '#A3ADBE',
          400: '#7B8598', 500: '#5B6578', 600: '#3A4459', 700: '#2A3550',
          800: '#1A2235', 900: '#131927', 950: '#0A0F1A'
        }
      }}}
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 p-8 font-['Plus_Jakarta_Sans'] dark:bg-slate-900">
  <div class="max-w-3xl mx-auto">

    <!-- FIORD:COMPONENT_START aesthetic="slate" component="pagination" -->
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">

      <!-- Results summary + items per page -->
      <div class="flex items-center gap-3">
        <p class="text-sm text-slate-600 dark:text-slate-400">
          Showing <span class="font-medium text-slate-900 dark:text-slate-100">76–100</span> of <span class="font-medium text-slate-900 dark:text-slate-100">689</span> results
        </p>
        <div class="flex items-center gap-1.5">
          <label for="per-page" class="text-xs text-slate-500 dark:text-slate-400">Per page</label>
          <select
            id="per-page"
            class="rounded-md border border-slate-300 bg-white py-1 pl-2 pr-7 text-xs text-slate-700 focus:border-[#4F63D2] focus:outline-none focus:ring-1 focus:ring-[#4F63D2] dark:border-slate-600 dark:bg-slate-700 dark:text-slate-300"
          >
            <option>10</option>
            <option>25</option>
            <option selected>25</option>
            <option>50</option>
            <option>100</option>
          </select>
        </div>
      </div>

      <!-- Page navigation -->
      <nav aria-label="Pagination">
        <ol class="flex items-center gap-1">

          <!-- Previous -->
          <li>
            <a
              href="#"
              class="flex items-center gap-1 rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-[#4F63D2] focus:ring-offset-1 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700"
              aria-label="Previous page"
            >
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
              </svg>
              Prev
            </a>
          </li>

          <!-- Page 2 -->
          <li>
            <a href="#" class="flex h-9 w-9 items-center justify-center rounded-md border border-slate-300 bg-white text-sm text-slate-700 hover:bg-slate-50 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700" aria-label="Page 2">2</a>
          </li>

          <!-- Page 3 -->
          <li>
            <a href="#" class="flex h-9 w-9 items-center justify-center rounded-md border border-slate-300 bg-white text-sm text-slate-700 hover:bg-slate-50 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700" aria-label="Page 3">3</a>
          </li>

          <!-- Current — Page 4 -->
          <li>
            <a
              href="#"
              class="flex h-9 w-9 items-center justify-center rounded-md border border-[#3D4FB8] bg-[#3D4FB8] text-sm font-medium text-white focus:outline-none dark:border-[#4F63D2] dark:bg-[#4F63D2]"
              aria-label="Page 4"
              aria-current="page"
            >4</a>
          </li>

          <!-- Page 5 -->
          <li>
            <a href="#" class="flex h-9 w-9 items-center justify-center rounded-md border border-slate-300 bg-white text-sm text-slate-700 hover:bg-slate-50 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700" aria-label="Page 5">5</a>
          </li>

          <!-- Ellipsis -->
          <li>
            <span class="flex h-9 w-9 items-center justify-center text-sm text-slate-500 dark:text-slate-400" aria-hidden="true">&hellip;</span>
          </li>

          <!-- Last page — 28 -->
          <li>
            <a href="#" class="flex h-9 w-9 items-center justify-center rounded-md border border-slate-300 bg-white text-sm text-slate-700 hover:bg-slate-50 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700" aria-label="Page 28">28</a>
          </li>

          <!-- Next -->
          <li>
            <a
              href="#"
              class="flex items-center gap-1 rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-[#4F63D2] focus:ring-offset-1 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700"
              aria-label="Next page"
            >
              Next
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
              </svg>
            </a>
          </li>

        </ol>
      </nav>

    </div>
    <!-- FIORD:COMPONENT_END -->

  </div>
</body>
</html>
