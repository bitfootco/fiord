<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiord — Slate / Avatar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        slate: {
          50: '#F7F8FA', 100: '#EEF0F4', 200: '#D2D7E2', 300: '#A3ADBE',
          400: '#7B8598', 500: '#5B6578', 600: '#3A4459', 700: '#2A3550',
          800: '#1A2235', 900: '#131927', 950: '#0A0F1A'
        }
      }}}
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 p-8 dark:bg-slate-900 font-['Plus_Jakarta_Sans']">
  <div class="max-w-2xl mx-auto space-y-8">

    <!-- FIORD:COMPONENT_START aesthetic="slate" component="avatar" -->

    <!-- Avatar with image -->
    <div>
      <p class="mb-3 text-xs font-medium uppercase tracking-wide text-slate-400 dark:text-slate-500">With Image</p>
      <div class="flex items-center gap-4">
        <img
          src="https://ui-avatars.com/api/?name=Sarah+Chen&background=6366f1&color=fff&size=128"
          alt="Sarah Chen"
          class="h-12 w-12 rounded-full object-cover ring-2 ring-white dark:ring-slate-800"
        >
        <div>
          <p class="text-sm font-medium text-slate-900 dark:text-slate-100">Sarah Chen</p>
          <p class="text-xs text-slate-500 dark:text-slate-400">Product Designer</p>
        </div>
      </div>
    </div>

    <!-- Avatar with initials fallback -->
    <div>
      <p class="mb-3 text-xs font-medium uppercase tracking-wide text-slate-400 dark:text-slate-500">Initials Fallback</p>
      <div class="flex items-center gap-3">
        <div class="flex h-12 w-12 items-center justify-center rounded-full bg-slate-600 text-sm font-semibold text-white dark:bg-slate-500" aria-label="Tom Ridley">TR</div>
        <div class="flex h-12 w-12 items-center justify-center rounded-full bg-[#3D4FB8] text-sm font-semibold text-white" aria-label="Priya Nair">PN</div>
        <div class="flex h-12 w-12 items-center justify-center rounded-full bg-[#0D7A62] text-sm font-semibold text-white" aria-label="James Okafor">JO</div>
        <div class="flex h-12 w-12 items-center justify-center rounded-full bg-rose-600 text-sm font-semibold text-white" aria-label="Lena Fischer">LF</div>
      </div>
    </div>

    <!-- Avatar sizes -->
    <div>
      <p class="mb-3 text-xs font-medium uppercase tracking-wide text-slate-400 dark:text-slate-500">Sizes</p>
      <div class="flex items-end gap-4">
        <div class="flex flex-col items-center gap-1.5">
          <img
            src="https://ui-avatars.com/api/?name=Sarah+Chen&background=6366f1&color=fff&size=32"
            alt="Sarah Chen"
            class="h-6 w-6 rounded-full object-cover"
          >
          <span class="text-xs text-slate-400 dark:text-slate-500">xs</span>
        </div>
        <div class="flex flex-col items-center gap-1.5">
          <img
            src="https://ui-avatars.com/api/?name=Sarah+Chen&background=6366f1&color=fff&size=32"
            alt="Sarah Chen"
            class="h-8 w-8 rounded-full object-cover"
          >
          <span class="text-xs text-slate-400 dark:text-slate-500">sm</span>
        </div>
        <div class="flex flex-col items-center gap-1.5">
          <img
            src="https://ui-avatars.com/api/?name=Sarah+Chen&background=6366f1&color=fff&size=64"
            alt="Sarah Chen"
            class="h-10 w-10 rounded-full object-cover"
          >
          <span class="text-xs text-slate-400 dark:text-slate-500">md</span>
        </div>
        <div class="flex flex-col items-center gap-1.5">
          <img
            src="https://ui-avatars.com/api/?name=Sarah+Chen&background=6366f1&color=fff&size=64"
            alt="Sarah Chen"
            class="h-14 w-14 rounded-full object-cover"
          >
          <span class="text-xs text-slate-400 dark:text-slate-500">lg</span>
        </div>
        <div class="flex flex-col items-center gap-1.5">
          <img
            src="https://ui-avatars.com/api/?name=Sarah+Chen&background=6366f1&color=fff&size=128"
            alt="Sarah Chen"
            class="h-20 w-20 rounded-full object-cover"
          >
          <span class="text-xs text-slate-400 dark:text-slate-500">xl</span>
        </div>
      </div>
    </div>

    <!-- Avatar group (stacked) -->
    <div>
      <p class="mb-3 text-xs font-medium uppercase tracking-wide text-slate-400 dark:text-slate-500">Group (Stacked)</p>
      <div class="flex items-center">
        <img
          src="https://ui-avatars.com/api/?name=Sarah+Chen&background=6366f1&color=fff&size=64"
          alt="Sarah Chen"
          class="h-9 w-9 rounded-full object-cover ring-2 ring-white dark:ring-slate-800"
        >
        <img
          src="https://ui-avatars.com/api/?name=Tom+Ridley&background=10b981&color=fff&size=64"
          alt="Tom Ridley"
          class="-ml-2.5 h-9 w-9 rounded-full object-cover ring-2 ring-white dark:ring-slate-800"
        >
        <img
          src="https://ui-avatars.com/api/?name=Priya+Nair&background=f59e0b&color=fff&size=64"
          alt="Priya Nair"
          class="-ml-2.5 h-9 w-9 rounded-full object-cover ring-2 ring-white dark:ring-slate-800"
        >
        <img
          src="https://ui-avatars.com/api/?name=James+Okafor&background=ef4444&color=fff&size=64"
          alt="James Okafor"
          class="-ml-2.5 h-9 w-9 rounded-full object-cover ring-2 ring-white dark:ring-slate-800"
        >
        <div class="-ml-2.5 flex h-9 w-9 items-center justify-center rounded-full border-2 border-white bg-slate-100 ring-2 ring-white text-xs font-medium text-slate-600 dark:border-slate-800 dark:bg-slate-700 dark:ring-slate-800 dark:text-slate-300">
          +4
        </div>
        <span class="ml-3 text-sm text-slate-500 dark:text-slate-400">8 members</span>
      </div>
    </div>

    <!-- Avatar with online status -->
    <div>
      <p class="mb-3 text-xs font-medium uppercase tracking-wide text-slate-400 dark:text-slate-500">With Status Indicator</p>
      <div class="flex items-center gap-6">
        <!-- Online -->
        <div class="flex flex-col items-center gap-1.5">
          <div class="relative">
            <img
              src="https://ui-avatars.com/api/?name=Sarah+Chen&background=6366f1&color=fff&size=64"
              alt="Sarah Chen"
              class="h-11 w-11 rounded-full object-cover"
            >
            <span class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-emerald-400 ring-2 ring-white dark:ring-slate-800"></span>
          </div>
          <span class="text-xs text-slate-400 dark:text-slate-500">Online</span>
        </div>
        <!-- Away -->
        <div class="flex flex-col items-center gap-1.5">
          <div class="relative">
            <img
              src="https://ui-avatars.com/api/?name=Tom+Ridley&background=10b981&color=fff&size=64"
              alt="Tom Ridley"
              class="h-11 w-11 rounded-full object-cover"
            >
            <span class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-amber-400 ring-2 ring-white dark:ring-slate-800"></span>
          </div>
          <span class="text-xs text-slate-400 dark:text-slate-500">Away</span>
        </div>
        <!-- Offline -->
        <div class="flex flex-col items-center gap-1.5">
          <div class="relative">
            <img
              src="https://ui-avatars.com/api/?name=Priya+Nair&background=f59e0b&color=fff&size=64"
              alt="Priya Nair"
              class="h-11 w-11 rounded-full object-cover"
            >
            <span class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-slate-400 ring-2 ring-white dark:ring-slate-800"></span>
          </div>
          <span class="text-xs text-slate-400 dark:text-slate-500">Offline</span>
        </div>
        <!-- Busy -->
        <div class="flex flex-col items-center gap-1.5">
          <div class="relative">
            <img
              src="https://ui-avatars.com/api/?name=James+Okafor&background=ef4444&color=fff&size=64"
              alt="James Okafor"
              class="h-11 w-11 rounded-full object-cover"
            >
            <span class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-red-500 ring-2 ring-white dark:ring-slate-800"></span>
          </div>
          <span class="text-xs text-slate-400 dark:text-slate-500">Busy</span>
        </div>
      </div>
    </div>

    <!-- FIORD:COMPONENT_END -->

  </div>
</body>
</html>
