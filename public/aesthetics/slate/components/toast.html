<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiord — Slate / Toast</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        slate: {
          50: '#F7F8FA', 100: '#EEF0F4', 200: '#D2D7E2', 300: '#A3ADBE',
          400: '#7B8598', 500: '#5B6578', 600: '#3A4459', 700: '#2A3550',
          800: '#1A2235', 900: '#131927', 950: '#0A0F1A'
        }
      }}}
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 p-8 dark:bg-slate-900 font-['Plus_Jakarta_Sans']">
  <div class="max-w-2xl mx-auto space-y-8">

    <!-- FIORD:COMPONENT_START aesthetic="slate" component="toast" -->
    <div class="flex flex-wrap gap-3 p-8 bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700">
      <button
        data-fiord-toast
        data-fiord-toast-type="success"
        class="px-4 py-2 text-sm font-medium text-white bg-[#0D7A62] hover:bg-emerald-700 rounded-md transition-colors"
      >
        Show Success
      </button>
      <button
        data-fiord-toast
        data-fiord-toast-type="error"
        class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-md transition-colors"
      >
        Show Error
      </button>
      <button
        data-fiord-toast
        data-fiord-toast-type="warning"
        class="px-4 py-2 text-sm font-medium text-slate-900 bg-amber-400 hover:bg-[#C47F17] rounded-md transition-colors"
      >
        Show Warning
      </button>
      <button
        data-fiord-toast
        data-fiord-toast-type="info"
        class="px-4 py-2 text-sm font-medium text-white bg-[#3D4FB8] hover:bg-[#3545A0] rounded-md transition-colors"
      >
        Show Info
      </button>
    </div>

    <!-- Toast container (rendered into by JS) -->
    <div
      id="fiord-toast-container"
      aria-live="polite"
      aria-atomic="false"
      class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"
    ></div>

    <!-- FIORD:COMPONENT_END -->

  </div>

  <!-- FIORD:JS_START -->
  <script>
    (function () {
      var TOAST_DURATION = 4000;

      var VARIANTS = {
        success: {
          icon: '<svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
          classes: 'bg-white dark:bg-slate-900 border border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-200',
          iconClasses: 'text-[#0F8A6E]',
          label: 'Changes saved successfully.',
        },
        error: {
          icon: '<svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
          classes: 'bg-white dark:bg-slate-900 border border-red-200 dark:border-red-800 text-red-800 dark:text-red-200',
          iconClasses: 'text-red-500',
          label: 'Something went wrong. Please try again.',
        },
        warning: {
          icon: '<svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>',
          classes: 'bg-white dark:bg-slate-900 border border-amber-200 dark:border-amber-700 text-amber-800 dark:text-amber-200',
          iconClasses: 'text-[#C47F17]',
          label: 'Your trial expires in 3 days.',
        },
        info: {
          icon: '<svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z"/></svg>',
          classes: 'bg-white dark:bg-slate-900 border border-[#C5CBE8] dark:border-[#3545A0] text-[#2A3180] dark:text-[#C5CBE8]',
          iconClasses: 'text-[#4F63D2]',
          label: 'Your report is ready to download.',
        },
      };

      function showToast(type) {
        var variant = VARIANTS[type] || VARIANTS.info;
        var container = document.getElementById('fiord-toast-container');
        if (!container) return;

        var toast = document.createElement('div');
        toast.setAttribute('role', 'alert');
        toast.className = [
          'pointer-events-auto flex items-start gap-3 w-80 px-4 py-3 rounded-md shadow-lg shadow-slate-900/10',
          'transition-all duration-300 opacity-0 translate-y-2',
          variant.classes
        ].join(' ');

        var iconWrapper = document.createElement('span');
        iconWrapper.className = variant.iconClasses;
        iconWrapper.innerHTML = variant.icon;

        var message = document.createElement('p');
        message.className = 'flex-1 text-sm font-medium leading-snug pt-0.5';
        message.textContent = variant.label;

        var closeBtn = document.createElement('button');
        closeBtn.className = 'shrink-0 p-0.5 opacity-60 hover:opacity-100 transition-opacity';
        closeBtn.setAttribute('aria-label', 'Dismiss notification');
        closeBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>';
        closeBtn.addEventListener('click', function () { removeToast(toast); });

        toast.appendChild(iconWrapper);
        toast.appendChild(message);
        toast.appendChild(closeBtn);
        container.appendChild(toast);

        // Animate in
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            toast.classList.remove('opacity-0', 'translate-y-2');
          });
        });

        var timer = setTimeout(function () { removeToast(toast); }, TOAST_DURATION);
        toast._fiordTimer = timer;
      }

      function removeToast(toast) {
        clearTimeout(toast._fiordTimer);
        toast.classList.add('opacity-0', 'translate-y-2');
        setTimeout(function () {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 300);
      }

      document.querySelectorAll('[data-fiord-toast]').forEach(function (trigger) {
        trigger.addEventListener('click', function () {
          var type = trigger.getAttribute('data-fiord-toast-type') || 'info';
          showToast(type);
        });
      });
    })();
  </script>
  <!-- FIORD:JS_END -->

</body>
</html>
