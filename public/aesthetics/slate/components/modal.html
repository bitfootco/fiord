<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiord — Slate / Modal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        slate: {
          50: '#F7F8FA', 100: '#EEF0F4', 200: '#D2D7E2', 300: '#A3ADBE',
          400: '#7B8598', 500: '#5B6578', 600: '#3A4459', 700: '#2A3550',
          800: '#1A2235', 900: '#131927', 950: '#0A0F1A'
        }
      }}}
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 p-8 dark:bg-slate-900 font-['Plus_Jakarta_Sans']">
  <div class="max-w-2xl mx-auto space-y-8">

    <!-- FIORD:COMPONENT_START aesthetic="slate" component="modal" -->
    <div
      id="modal-demo"
      data-fiord-modal
      class="hidden fixed inset-0 z-50 flex items-center justify-center"
      aria-modal="true"
      role="dialog"
      aria-labelledby="modal-title"
    >
      <!-- Backdrop -->
      <div
        data-fiord-close
        class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"
        aria-hidden="true"
      ></div>

      <!-- Modal panel -->
      <div class="relative z-10 w-full max-w-md mx-4 bg-white dark:bg-slate-800 rounded-lg shadow-xl shadow-slate-900/10 dark:shadow-slate-950/30 border border-slate-200 dark:border-slate-700">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700">
          <h2 id="modal-title" class="font-['Outfit'] text-base font-semibold text-slate-900 dark:text-slate-100">
            Delete Project
          </h2>
          <button
            data-fiord-close
            class="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 rounded transition-colors"
            aria-label="Close modal"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <!-- Body -->
        <div class="px-6 py-5">
          <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed">
            Are you sure you want to delete <strong class="text-slate-900 dark:text-slate-100">Project Atlas</strong>?
            This action is permanent and cannot be undone. All associated data, including pipelines,
            reports, and collaborator access, will be removed immediately.
          </p>
        </div>

        <!-- Footer -->
        <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-200 dark:border-slate-700">
          <button
            data-fiord-close
            class="px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
          >
            Cancel
          </button>
          <button
            class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700 dark:bg-red-700 dark:hover:bg-red-600 transition-colors"
          >
            Delete Project
          </button>
        </div>
      </div>
    </div>

    <!-- FIORD:COMPONENT_END -->

  </div>

  <!-- FIORD:JS_START -->
  <script>
    (function () {
      function openModal(modal) {
        modal.classList.remove('hidden');
        modal.removeAttribute('aria-hidden');
        document.body.style.overflow = 'hidden';
        var firstFocusable = modal.querySelector('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
        if (firstFocusable) firstFocusable.focus();
      }

      function closeModal(modal) {
        modal.classList.add('hidden');
        modal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      }

      // Open triggers
      document.querySelectorAll('[data-fiord-modal-open]').forEach(function (trigger) {
        trigger.addEventListener('click', function () {
          var targetId = trigger.getAttribute('data-fiord-modal-open');
          var modal = document.getElementById(targetId);
          if (modal) openModal(modal);
        });
      });

      // Close triggers (X button + Cancel button)
      document.querySelectorAll('[data-fiord-modal]').forEach(function (modal) {
        modal.querySelectorAll('[data-fiord-close]').forEach(function (closer) {
          closer.addEventListener('click', function () {
            closeModal(modal);
          });
        });
      });

      // Backdrop click closes modal
      document.querySelectorAll('[data-fiord-modal]').forEach(function (modal) {
        modal.addEventListener('click', function (e) {
          if (e.target === modal) closeModal(modal);
        });
      });

      // Escape key closes modal
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          document.querySelectorAll('[data-fiord-modal]:not(.hidden)').forEach(function (modal) {
            closeModal(modal);
          });
        }
      });
    })();
  </script>
  <!-- FIORD:JS_END -->

</body>
</html>
