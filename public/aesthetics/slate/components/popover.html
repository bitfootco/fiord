<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiord — Slate / Popover</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        slate: {
          50: '#F7F8FA', 100: '#EEF0F4', 200: '#D2D7E2', 300: '#A3ADBE',
          400: '#7B8598', 500: '#5B6578', 600: '#3A4459', 700: '#2A3550',
          800: '#1A2235', 900: '#131927', 950: '#0A0F1A'
        }
      }}}
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 p-8 dark:bg-slate-900 font-['Plus_Jakarta_Sans']">
  <div class="max-w-2xl mx-auto">

    <!-- FIORD:COMPONENT_START aesthetic="slate" component="popover" -->
    <div class="flex flex-wrap items-start gap-10 p-8 bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700">

      <!-- Popover example 1: Info popover -->
      <div class="relative inline-block">
        <button
          data-fiord-popover-trigger="popover-info"
          class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-slate-700 dark:text-slate-300 border border-slate-300 dark:border-slate-600 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
          aria-expanded="false"
          aria-haspopup="true"
        >
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z"/>
          </svg>
          More info
        </button>

        <div
          id="popover-info"
          data-fiord-popover-panel
          class="hidden absolute left-0 top-full mt-2 z-20 w-72 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg shadow-lg shadow-slate-900/10 dark:shadow-slate-950/30"
          role="region"
          aria-label="More information"
        >
          <div class="p-4">
            <h3 class="font-['Outfit'] text-sm font-semibold text-slate-900 dark:text-slate-100 mb-1">Retention Rate</h3>
            <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed mb-3">
              Measures the percentage of users who return within 30 days of their first session.
              Industry average for B2B SaaS is 35–45%.
            </p>
            <a
              href="#"
              class="inline-flex items-center gap-1 text-xs font-medium text-[#3D4FB8] dark:text-[#6B7BE0] hover:text-[#3545A0] dark:hover:text-[#8B96E8] transition-colors"
            >
              View documentation
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
              </svg>
            </a>
          </div>
        </div>
      </div>

      <!-- Popover example 2: User card popover -->
      <div class="relative inline-block">
        <button
          data-fiord-popover-trigger="popover-user"
          class="inline-flex items-center gap-2 px-3 py-1.5 text-sm font-medium text-slate-700 dark:text-slate-300 border border-slate-300 dark:border-slate-600 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
          aria-expanded="false"
          aria-haspopup="true"
        >
          <span class="w-5 h-5 rounded-full bg-[#ECEEFB] dark:bg-[#2A3180] flex items-center justify-center text-xs font-bold text-[#3D4FB8] dark:text-[#8B96E8]">J</span>
          Assigned to
        </button>

        <div
          id="popover-user"
          data-fiord-popover-panel
          class="hidden absolute left-0 top-full mt-2 z-20 w-64 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg shadow-lg shadow-slate-900/10 dark:shadow-slate-950/30"
          role="region"
          aria-label="Assignee details"
        >
          <div class="p-4">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-full bg-[#ECEEFB] dark:bg-[#2A3180] flex items-center justify-center text-sm font-bold text-[#3D4FB8] dark:text-[#8B96E8] shrink-0">
                JE
              </div>
              <div>
                <p class="text-sm font-semibold text-slate-900 dark:text-slate-100">Jordan Ellsworth</p>
                <p class="text-xs text-slate-500 dark:text-slate-400">jordan@meridian.io</p>
              </div>
            </div>
            <button
              class="w-full px-3 py-1.5 text-xs font-medium text-slate-700 dark:text-slate-300 border border-slate-300 dark:border-slate-600 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
            >
              Reassign
            </button>
          </div>
        </div>
      </div>

    </div>
    <!-- FIORD:COMPONENT_END -->

  </div>

  <!-- FIORD:JS_START -->
  <script>
    (function () {
      var openPanel = null;
      var openTrigger = null;

      function showPopover(trigger, panel) {
        panel.classList.remove('hidden');
        trigger.setAttribute('aria-expanded', 'true');
        openPanel = panel;
        openTrigger = trigger;
      }

      function hidePopover(trigger, panel) {
        panel.classList.add('hidden');
        trigger.setAttribute('aria-expanded', 'false');
        openPanel = null;
        openTrigger = null;
      }

      document.querySelectorAll('[data-fiord-popover-trigger]').forEach(function (trigger) {
        trigger.addEventListener('click', function (e) {
          e.stopPropagation();
          var panelId = trigger.getAttribute('data-fiord-popover-trigger');
          var panel = document.getElementById(panelId);
          if (!panel) return;

          var isOpen = !panel.classList.contains('hidden');

          // Close any other open popover
          if (openPanel && openPanel !== panel) {
            hidePopover(openTrigger, openPanel);
          }

          if (isOpen) {
            hidePopover(trigger, panel);
          } else {
            showPopover(trigger, panel);
          }
        });
      });

      // Click outside to close
      document.addEventListener('click', function (e) {
        if (openPanel && !openPanel.contains(e.target) && openTrigger && !openTrigger.contains(e.target)) {
          hidePopover(openTrigger, openPanel);
        }
      });

      // Escape key to close
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && openPanel) {
          hidePopover(openTrigger, openPanel);
          if (openTrigger) openTrigger.focus();
        }
      });
    })();
  </script>
  <!-- FIORD:JS_END -->

</body>
</html>
