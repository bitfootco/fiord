<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiord — Slate / Tooltip</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        slate: {
          50: '#F7F8FA', 100: '#EEF0F4', 200: '#D2D7E2', 300: '#A3ADBE',
          400: '#7B8598', 500: '#5B6578', 600: '#3A4459', 700: '#2A3550',
          800: '#1A2235', 900: '#131927', 950: '#0A0F1A'
        }
      }}}
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 p-8 dark:bg-slate-900 font-['Plus_Jakarta_Sans']">
  <div class="max-w-2xl mx-auto">

    <!-- FIORD:COMPONENT_START aesthetic="slate" component="tooltip" -->
    <div class="flex flex-wrap items-center gap-8 p-8 bg-white dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700">

      <!-- Tooltip example 1: Icon button -->
      <div class="flex flex-col items-center gap-2">
        <p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wide font-medium">Icon button</p>
        <button
          data-fiord-tooltip="Download as CSV"
          class="p-2 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-md transition-colors"
          aria-label="Download as CSV"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
        </button>
      </div>

      <!-- Tooltip example 2: Help icon -->
      <div class="flex flex-col items-center gap-2">
        <p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wide font-medium">Help icon</p>
        <span
          data-fiord-tooltip="Retention rate measures the percentage of users who return after their first visit within a 30-day window."
          class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 text-xs font-semibold cursor-default select-none"
          tabindex="0"
          aria-label="More information"
        >
          ?
        </span>
      </div>

      <!-- Tooltip example 3: Disabled button -->
      <div class="flex flex-col items-center gap-2">
        <p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wide font-medium">Disabled action</p>
        <span
          data-fiord-tooltip="You don't have permission to publish. Contact your admin."
          class="inline-block"
          tabindex="0"
        >
          <button
            disabled
            class="px-4 py-2 text-sm font-medium text-slate-400 dark:text-slate-500 bg-slate-100 dark:bg-slate-700 rounded-md cursor-not-allowed select-none"
            aria-disabled="true"
          >
            Publish
          </button>
        </span>
      </div>

    </div>
    <!-- FIORD:COMPONENT_END -->

  </div>

  <!-- FIORD:JS_START -->
  <script>
    (function () {
      var activeTooltip = null;

      function createTooltip(text) {
        var el = document.createElement('div');
        el.setAttribute('role', 'tooltip');
        el.className = [
          'fixed z-50 px-2.5 py-1.5 text-xs font-medium',
          'text-white bg-slate-900 dark:bg-slate-700 rounded-md shadow-sm',
          'pointer-events-none whitespace-nowrap max-w-xs',
          'transition-opacity duration-150'
        ].join(' ');
        el.textContent = text;
        document.body.appendChild(el);
        return el;
      }

      function positionTooltip(tooltip, trigger) {
        var rect = trigger.getBoundingClientRect();
        var tooltipRect = tooltip.getBoundingClientRect();
        var gap = 8;

        var top = rect.top - tooltipRect.height - gap + window.scrollY;
        var left = rect.left + rect.width / 2 - tooltipRect.width / 2 + window.scrollX;

        // Flip to below if not enough space above
        if (top < window.scrollY + gap) {
          top = rect.bottom + gap + window.scrollY;
        }

        // Keep within horizontal bounds
        left = Math.max(gap, Math.min(left, window.innerWidth - tooltipRect.width - gap));

        tooltip.style.top = top + 'px';
        tooltip.style.left = left + 'px';
      }

      function showTooltip(trigger) {
        var text = trigger.getAttribute('data-fiord-tooltip');
        if (!text) return;
        var tooltip = createTooltip(text);
        activeTooltip = tooltip;
        // Position after render
        requestAnimationFrame(function () {
          positionTooltip(tooltip, trigger);
        });
        trigger._fiordTooltip = tooltip;
      }

      function hideTooltip(trigger) {
        if (trigger._fiordTooltip) {
          trigger._fiordTooltip.remove();
          trigger._fiordTooltip = null;
        }
        activeTooltip = null;
      }

      document.querySelectorAll('[data-fiord-tooltip]').forEach(function (trigger) {
        trigger.addEventListener('mouseenter', function () { showTooltip(trigger); });
        trigger.addEventListener('mouseleave', function () { hideTooltip(trigger); });
        trigger.addEventListener('focus', function () { showTooltip(trigger); });
        trigger.addEventListener('blur', function () { hideTooltip(trigger); });
      });

      // Clean up on scroll/resize
      window.addEventListener('scroll', function () {
        if (activeTooltip) activeTooltip.remove();
        activeTooltip = null;
      }, { passive: true });
    })();
  </script>
  <!-- FIORD:JS_END -->

</body>
</html>
